<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Home</title>
  <style>
    :root {
      --orange-primary: #FF8C00;
      --orange-soft: #F29D35;
      --background: #F9E5CA;
      --card: #FFF1DF;
      --brown: #A48255;
      --brown-soft: #CC9C5B;
      --white: #FFFFFF;
      --font-main: 'ITC Avant Garde Gothic Pro', 'Avant Garde', 'Century Gothic', 'Avenir Next', Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--background);
      font-family: var(--font-main);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-x: hidden;
    }

    button,
    input {
      font-family: inherit;
    }

    .phone {
      position: relative;
      width: 375px;
      height: 812px;
      max-width: 100vw;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--background);
      scrollbar-width: none;
    }

    .phone::-webkit-scrollbar {
      display: none;
    }

    .screen {
      position: relative;
      width: 375px;
      min-height: 1031px;
      background: var(--background);
    }

    .gradient {
      position: absolute;
      width: 377px;
      height: 762px;
      left: -2px;
      top: -1px;
      background: linear-gradient(180deg, #FF8C00 38.46%, rgba(255, 255, 255, 0) 100%);
      pointer-events: none;
    }

    .profile-badge {
      position: absolute;
      width: 34.75px;
      height: 33.75px;
      left: 18px;
      top: 22px;
      border: 0;
      border-radius: 25.35px;
      background: var(--orange-soft);
      color: var(--white);
      font-size: 19.6308px;
      font-weight: 700;
      line-height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4.87499px;
    }

    .work-switch {
      position: absolute;
      width: 142px;
      height: 25px;
      left: 222px;
      top: 30px;
      border-radius: 68px;
      background: var(--background);
      border: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      overflow: visible;
      cursor: pointer;
    }

    .work-switch::before {
      content: "";
      position: absolute;
      width: 72px;
      height: 19.21px;
      left: 3px;
      top: 2.89px;
      border-radius: 28.911px;
      background: var(--orange-primary);
      transition: transform 260ms cubic-bezier(.2,.8,.2,1);
      z-index: 1;
    }

    .work-switch.full::before {
      transform: translateX(64px);
    }

    .work-switch span {
      position: relative;
      z-index: 2;
      height: 16px;
      font-size: 12.6px;
      font-weight: 500;
      line-height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 180ms ease;
      white-space: nowrap;
    }

    .work-switch .part {
      width: 72px;
      color: var(--card);
      padding-left: 2px;
    }

    .work-switch .full {
      width: 70px;
      color: var(--orange-primary);
      padding-right: 2px;
    }

    .work-switch.full .part {
      color: var(--orange-primary);
    }

    .work-switch.full .full {
      color: var(--card);
    }

    .date-label {
      position: absolute;
      width: 59px;
      height: 10px;
      left: 296px;
      top: 71px;
      font-weight: 500;
      font-size: 8.66769px;
      line-height: 10px;
      color: var(--background);
      white-space: nowrap;
    }

    .metric-caption {
      position: absolute;
      width: 39px;
      height: 16px;
      left: 53px;
      top: 82px;
      font-weight: 500;
      font-size: 13px;
      line-height: 16px;
      color: var(--white);
      display: flex;
      align-items: center;
    }

    .main-amount {
      position: absolute;
      width: 250px;
      height: 64px;
      left: 48px;
      top: 108px;
      font-weight: 600;
      font-size: 53.625px;
      line-height: 64px;
      color: var(--white);
      display: flex;
      align-items: center;
      transition: transform 180ms ease, opacity 180ms ease;
      white-space: nowrap;
    }

    .main-amount.updating {
      transform: translateY(-4px);
      opacity: .55;
    }

    .metric-tabs {
      position: absolute;
      width: 213px;
      height: 21px;
      left: 88px;
      top: 169px;
      background: var(--background);
      border-radius: 72px;
      display: flex;
      align-items: center;
      padding: 2px 0;
      overflow: hidden;
    }

    .metric-indicator {
      position: absolute;
      width: 57px;
      height: 17px;
      left: 7px;
      top: 2px;
      background: var(--orange-primary);
      border-radius: 117px;
      transition: transform 250ms cubic-bezier(.2,.8,.2,1);
      z-index: 1;
    }

    .metric-tabs[data-active="missing"] .metric-indicator {
      transform: translateX(71px);
    }

    .metric-tabs[data-active="daily"] .metric-indicator {
      transform: translateX(142px);
    }

    .metric-tab {
      position: relative;
      z-index: 2;
      width: 71px;
      height: 17px;
      border: 0;
      background: transparent;
      color: var(--brown-soft);
      font-weight: 600;
      font-size: 10.8615px;
      line-height: 17px;
      cursor: pointer;
      padding: 0 0 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: color 170ms ease;
    }

    .metric-tab[data-tab="earned"],
    .metric-tab[data-tab="missing"],
    .metric-tab[data-tab="daily"] {
      width: 71px;
    }

    .metric-tabs[data-active="earned"] .metric-tab[data-tab="earned"],
    .metric-tabs[data-active="missing"] .metric-tab[data-tab="missing"],
    .metric-tabs[data-active="daily"] .metric-tab[data-tab="daily"] {
      color: var(--background);
    }

    .months {
      position: absolute;
      width: 339px;
      height: 20px;
      left: 18px;
      top: 221.47px;
      display: flex;
      gap: 7.62px;
    }

    .month-btn {
      width: 41.9px;
      height: 20px;
      border: 1px solid transparent;
      border-radius: 48.5646px;
      background: transparent;
      color: var(--background);
      font-size: 12.3792px;
      line-height: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 0 1px;
      cursor: pointer;
    }

    .month-btn.active {
      background: var(--orange-primary);
      border-color: var(--card);
    }

    .question {
      position: absolute;
      width: 234px;
      height: 25px;
      left: 70px;
      top: 268px;
      font-weight: 600;
      font-size: 20.8876px;
      line-height: 25px;
      color: var(--card);
      display: flex;
      align-items: center;
      white-space: nowrap;
    }

    .input-wrap {
      position: absolute;
      width: 234px;
      height: 33px;
      left: 70px;
      top: 299px;
      background: var(--card);
      border-radius: 21px;
      display: flex;
      align-items: center;
      padding-left: 12px;
      overflow: hidden;
    }

    .input-currency {
      font-weight: 600;
      font-size: 20.3817px;
      line-height: 24px;
      color: var(--orange-primary);
      margin-right: 1px;
    }

    .sales-input {
      width: 190px;
      height: 31px;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--orange-primary);
      font-weight: 600;
      font-size: 20.3817px;
      line-height: 24px;
      padding: 1px 0 0;
    }

    .sales-input::placeholder {
      color: var(--orange-primary);
      opacity: 1;
    }

    .goal-card {
      position: absolute;
      width: 162px;
      height: 115px;
      left: 16px;
      top: 366px;
      background: var(--card);
      border-radius: 21px;
      padding: 13px 0 0 22px;
    }


    .goal-edit {
      margin-top: 2px;
      width: 118px;
      height: 28px;
      display: flex;
      align-items: center;
      color: var(--orange-primary);
      font-weight: 500;
      font-size: 21.5581px;
      line-height: 26px;
      white-space: nowrap;
    }

    .goal-edit span {
      flex: 0 0 auto;
    }

    .goal-input {
      width: 105px;
      height: 28px;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--orange-primary);
      font-weight: 500;
      font-size: 21.5581px;
      line-height: 26px;
      padding: 0;
    }

    .progress-card-detailed {
      align-items: stretch;
      justify-content: flex-start;
    }

    .work-days-group {
      position: absolute;
      left: 17px;
      top: 14px;
      width: 70px;
      height: 43px;
    }

    .work-days-label,
    .remaining-days-label,
    .progress-title {
      color: var(--brown);
      font-size: 10.8px;
      font-weight: 500;
      line-height: 13px;
      white-space: nowrap;
    }

    .work-days-input {
      width: 44px;
      height: 27px;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--orange-primary);
      font-size: 25px;
      font-weight: 500;
      line-height: 28px;
      padding: 0;
      margin-top: 1px;
    }

    .remaining-days-group {
      position: absolute;
      left: 17px;
      top: 72px;
      width: 74px;
      height: 34px;
    }

    .remaining-days-value {
      color: var(--orange-primary);
      font-size: 25px;
      font-weight: 500;
      line-height: 28px;
      margin-top: 1px;
    }

    .progress-title {
      position: absolute;
      left: 108px;
      top: 14px;
      width: 48px;
      text-align: center;
    }

    .goal-label {
      font-weight: 300;
      font-size: 8.29158px;
      line-height: 10px;
      color: var(--brown);
    }

    .goal-amount {
      margin-top: 2px;
      font-weight: 500;
      font-size: 21.5581px;
      line-height: 26px;
      color: var(--orange-primary);
      white-space: nowrap;
    }

    .commission-block {
      position: absolute;
      left: 22px;
      top: 69px;
      width: 79px;
      height: 38px;
    }

    .commission-label {
      font-weight: 300;
      font-size: 8.29158px;
      line-height: 10px;
      color: var(--brown);
      white-space: nowrap;
    }

    .commission-amount {
      font-weight: 500;
      font-size: 21.5581px;
      line-height: 26px;
      color: var(--orange-primary);
      white-space: nowrap;
    }

    .progress-card {
      position: absolute;
      width: 172px;
      height: 115px;
      left: 193px;
      top: 366px;
      background: var(--card);
      border-radius: 21px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .progress-ring {
      position: absolute;
      width: 68px;
      height: 68px;
      left: 103px;
      top: 38px;
      border-radius: 50%;
      background:
        conic-gradient(var(--orange-primary) calc(var(--progress) * 1%), transparent 0);
      transition: background 260ms ease;
    }

    .progress-ring::before {
      content: "";
      position: absolute;
      inset: 7px;
      background: var(--card);
      border-radius: 50%;
    }

    .progress-percent {
      position: absolute;
      width: 68px;
      height: 68px;
      left: 103px;
      top: 38px;
      font-weight: 600;
      font-size: 17px;
      line-height: 25px;
      color: var(--orange-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 2;
      white-space: nowrap;
      overflow: hidden;
    }

    .week-card {
      position: absolute;
      width: 339px;
      height: 115px;
      left: 18px;
      top: 508px;
      background: var(--card);
      border-radius: 21px;
    }

    .month-title {
      position: absolute;
      width: 78px;
      height: 18px;
      left: 148px;
      top: 518px;
      font-weight: 500;
      font-size: 14.9248px;
      line-height: 18px;
      color: var(--orange-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .week-selector {
      position: absolute;
      left: 52px;
      top: 547px;
      width: 272px;
      height: 58px;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      align-items: stretch;
    }

    .week-selector.weekend-only {
      left: 35px;
      width: 305px;
      grid-template-columns: repeat(var(--visible-days, 7), 1fr);
      column-gap: 0;
    }

    .day-btn {
      position: relative;
      border: 0;
      background: transparent;
      color: var(--brown);
      font-weight: 500;
      cursor: pointer;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      border-radius: 53.5385px;
    }

    .day-bg {
      position: absolute;
      width: 29px;
      height: 58px;
      top: 0;
      left: 50%;
      margin-left: -14.5px;
      border-radius: 53.5385px;
      background: transparent;
      transition: background 200ms ease;
    }

    .day-btn.active .day-bg {
      background: var(--orange-primary);
    }

    .day-name,
    .day-number {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      color: inherit;
      transition: color 170ms ease;
    }

    .day-name {
      height: 14px;
      margin-top: 8px;
      font-size: 11.697px;
      line-height: 14px;
    }

    .day-number {
      height: 14px;
      margin-top: 15px;
      font-size: 11.697px;
      line-height: 14px;
    }

    .day-btn.active .day-name,
    .day-btn.active .day-number {
      color: var(--background);
    }

    .calendar-pointer {
      position: absolute;
      width: 45px;
      height: 33px;
      left: 165px;
      top: 604px;
      overflow: hidden;
    }

    .calendar-pointer::before {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      left: 10.5px;
      top: -12px;
      background: var(--card);
      border-radius: 7px;
      transform: rotate(45deg);
    }

    .calendar-panel {
      position: absolute;
      width: 339px;
      height: 388px;
      left: 18px;
      top: 643px;
      background: var(--card);
      border-radius: 21px;
    }

    .calendar-heading {
      position: absolute;
      width: 84px;
      height: 18px;
      left: 26px;
      top: 33px;
      color: var(--orange-primary);
      font-size: 14.9248px;
      font-weight: 500;
      line-height: 18px;
      display: flex;
      align-items: center;
    }

    .view-all {
      position: absolute;
      width: 45px;
      height: 14px;
      right: 24px;
      top: 34px;
      border: 0;
      background: transparent;
      padding: 0;
      color: var(--orange-primary);
      font-size: 8.18459px;
      line-height: 10px;
      font-weight: 500;
      cursor: pointer;
    }

    .entry-list {
      position: absolute;
      width: 289px;
      left: 26px;
      top: 76px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .entry {
      width: 289px;
      height: 53px;
      border-radius: 16px;
      background: var(--background);
      position: relative;
      flex: 0 0 auto;
      display: none;
    }

    .entry.visible {
      display: block;
    }

    .entry-day {
      position: absolute;
      width: 26px;
      height: 10px;
      left: 24px;
      top: 9px;
      font-weight: 500;
      font-size: 8.32972px;
      line-height: 10px;
      color: var(--orange-primary);
      text-align: center;
    }

    .entry-number {
      position: absolute;
      width: 35px;
      height: 30px;
      left: 19px;
      top: 18.97px;
      font-weight: 500;
      font-size: 24.9891px;
      line-height: 30px;
      color: var(--brown);
      text-align: center;
    }

    .entry-description {
      position: absolute;
      width: 125px;
      height: 11px;
      left: 82px;
      top: 20px;
      font-weight: 500;
      font-size: 9.53133px;
      line-height: 11px;
      color: var(--brown);
      text-align: center;
      white-space: nowrap;
    }

    .entry-charge {
      position: absolute;
      width: 61.6px;
      height: 11.85px;
      left: 113.7px;
      top: 32px;
      background: var(--background);
      border-radius: 32.2215px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1px;
    }

    .entry-pill {
      width: 30.88px;
      height: 9.1px;
      border-radius: 13.6993px;
      background: var(--orange-primary);
      color: var(--card);
      font-size: 6.16px;
      line-height: 7px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 1px;
    }

    .entry-commission {
      width: 30px;
      height: 7px;
      color: var(--orange-primary);
      font-size: 6.16px;
      line-height: 7px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .entry-amount {
      position: absolute;
      width: 62px;
      height: 13px;
      left: 226px;
      top: 21px;
      font-weight: 500;
      font-size: 10.9787px;
      line-height: 13px;
      color: var(--orange-primary);
      text-align: center;
      white-space: nowrap;
    }

    .bottom-bar {
      position: sticky;
      bottom: 0;
      width: 387px;
      height: 38px;
      margin-left: -12px;
      background: var(--orange-primary);
      z-index: 20;
    }


    .month-refresh {
      position: absolute;
      width: 375px;
      height: 763px;
      left: 0;
      top: 268px;
      opacity: 0;
      pointer-events: none;
      z-index: 18;
      background: linear-gradient(
        180deg,
        rgba(255, 140, 0, .62) 0%,
        rgba(249, 229, 202, .58) 34%,
        rgba(255, 241, 223, .28) 68%,
        rgba(255, 241, 223, 0) 100%
      );
      transform: translate3d(0, -28px, 0);
      will-change: opacity, transform;
    }

    .month-refresh.active {
      animation: monthOpacitySweep 560ms cubic-bezier(.22,.75,.22,1) forwards;
    }

    .save-toast {
      position: absolute;
      width: 158px;
      height: 30px;
      left: 108px;
      top: 337px;
      border-radius: 18px;
      background: var(--card);
      color: var(--orange-primary);
      font-weight: 600;
      font-size: 11px;
      line-height: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(10px) scale(.96);
      pointer-events: none;
      box-shadow: 0 10px 20px rgba(164, 130, 85, .12);
      z-index: 12;
    }

    .save-toast.show {
      animation: savedPop 1050ms cubic-bezier(.2,.8,.2,1) forwards;
    }

    .save-check {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: var(--orange-primary);
      color: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      margin-right: 6px;
    }

    @keyframes savedPop {
      0% {
        opacity: 0;
        transform: translateY(10px) scale(.96);
      }
      18% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      78% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(-7px) scale(.98);
      }
    }

    .screen.refreshing .question,
    .screen.refreshing .input-wrap,
    .screen.refreshing .goal-card,
    .screen.refreshing .progress-card,
    .screen.refreshing .week-card,
    .screen.refreshing .month-title,
    .screen.refreshing .week-selector,
    .screen.refreshing .calendar-pointer,
    .screen.refreshing .calendar-panel {
      animation: softRefresh 560ms cubic-bezier(.22,.75,.22,1) both;
      will-change: opacity, transform;
    }

    .screen.refreshing .question,
    .screen.refreshing .input-wrap {
      animation-delay: 0ms;
    }

    .screen.refreshing .goal-card,
    .screen.refreshing .progress-card {
      animation-delay: 35ms;
    }

    .screen.refreshing .week-card,
    .screen.refreshing .month-title,
    .screen.refreshing .week-selector,
    .screen.refreshing .calendar-pointer {
      animation-delay: 70ms;
    }

    .screen.refreshing .calendar-panel {
      animation-delay: 105ms;
    }

    @keyframes softRefresh {
      0% {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }
      42% {
        opacity: .16;
        transform: translate3d(0, 7px, 0);
      }
      100% {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }
    }

    @keyframes monthOpacitySweep {
      0% {
        opacity: 0;
        transform: translate3d(0, -28px, 0);
      }
      28% {
        opacity: .86;
      }
      72% {
        opacity: .46;
      }
      100% {
        opacity: 0;
        transform: translate3d(0, 34px, 0);
      }
    }

    @media (max-width: 374px) {
      .phone {
        transform-origin: top center;
        transform: scale(calc(100vw / 375));
        height: calc(812px * (100vw / 375));
      }
    }
  </style>
</head>
<body>
  <main class="phone" aria-label="Aplicación móvil Home">
    <section class="screen">
      <div class="gradient"></div>

      <button class="profile-badge" type="button" aria-label="Perfil">00</button>

      <button class="work-switch" id="workSwitch" type="button" aria-label="Cambiar tipo de jornada">
        <span class="part">Part time</span>
        <span class="full">Full Time</span>
      </button>

      <div class="date-label" id="dateLabel">jueves, 10 Jun</div>

      <div class="metric-caption" id="metricCaption">Llevas</div>
      <div class="main-amount" id="mainAmount">$0</div>

      <div class="metric-tabs" id="metricTabs" data-active="earned" role="tablist" aria-label="Métricas">
        <div class="metric-indicator"></div>
        <button class="metric-tab" type="button" data-tab="earned">Llevas</button>
        <button class="metric-tab" type="button" data-tab="missing">Falta</button>
        <button class="metric-tab" type="button" data-tab="daily">Diario</button>
      </div>

      <nav class="months" aria-label="Meses">
        <button class="month-btn active" type="button" data-month="Jun">Jun</button>
        <button class="month-btn" type="button" data-month="Jul">Jul</button>
        <button class="month-btn" type="button" data-month="Ago">Ago</button>
        <button class="month-btn" type="button" data-month="Sep">Sep</button>
        <button class="month-btn" type="button" data-month="Oct">Oct</button>
        <button class="month-btn" type="button" data-month="Nov">Nov</button>
        <button class="month-btn" type="button" data-month="Dic">Dic</button>
      </nav>

      <label class="question" for="salesInput">¿Cuánto vendiste hoy?</label>
      <div class="input-wrap">
        <span class="input-currency">$</span>
        <input
          id="salesInput"
          class="sales-input"
          type="text"
          inputmode="numeric"
          autocomplete="off"
          value=""
          placeholder="0"
          aria-label="Monto vendido hoy"
        />
      </div>
      <div class="save-toast" id="saveToast" aria-hidden="true">
        <span class="save-check">✓</span>
        Monto guardado
      </div>

      <section class="goal-card" aria-label="Resumen mensual">
        <label class="goal-label" for="goalInput">Meta del mes</label>
        <div class="goal-edit">
          <span>$</span>
          <input id="goalInput" class="goal-input" type="text" inputmode="numeric" value="4.000.000" aria-label="Meta del mes editable" />
        </div>

        <div class="commission-block">
          <div class="commission-label">Comisión estimada</div>
          <div class="commission-amount" id="commissionAmount">$0</div>
        </div>
      </section>

      <section class="progress-card progress-card-detailed" aria-label="Progreso de la meta">
        <div class="work-days-group">
          <label class="work-days-label" for="workDaysInput">Días a trabajar</label>
          <input id="workDaysInput" class="work-days-input" type="text" inputmode="numeric" value="0" aria-label="Días a trabajar editables" />
        </div>

        <div class="remaining-days-group">
          <div class="remaining-days-label">Días restantes</div>
          <div class="remaining-days-value" id="remainingDaysValue">0</div>
        </div>

        <div class="progress-title">Progreso</div>
        <div class="progress-ring" id="progressRing" style="--progress: 0"></div>
        <div class="progress-percent" id="progressPercent">0%</div>
      </section>

      <section class="week-card" aria-label="Calendario semanal"></section>
      <div class="month-refresh" id="monthRefresh" aria-hidden="true"></div>
      <div class="month-title" id="monthTitle">Junio 2026</div>

      <div class="week-selector" id="weekSelector" aria-label="Días de la semana">
        <button class="day-btn" type="button" data-index="0">
          <span class="day-bg"></span><span class="day-name">Lun</span><span class="day-number">07</span>
        </button>
        <button class="day-btn" type="button" data-index="1">
          <span class="day-bg"></span><span class="day-name">Mar</span><span class="day-number">08</span>
        </button>
        <button class="day-btn" type="button" data-index="2">
          <span class="day-bg"></span><span class="day-name">Mir</span><span class="day-number">09</span>
        </button>
        <button class="day-btn active" type="button" data-index="3">
          <span class="day-bg"></span><span class="day-name">Jue</span><span class="day-number">10</span>
        </button>
        <button class="day-btn" type="button" data-index="4">
          <span class="day-bg"></span><span class="day-name">Vie</span><span class="day-number">11</span>
        </button>
        <button class="day-btn" type="button" data-index="5">
          <span class="day-bg"></span><span class="day-name">Sab</span><span class="day-number">12</span>
        </button>
        <button class="day-btn" type="button" data-index="6">
          <span class="day-bg"></span><span class="day-name">Dom</span><span class="day-number">13</span>
        </button>
      </div>

      <div class="calendar-pointer"></div>

      <section class="calendar-panel" aria-label="Calendario">
        <h2 class="calendar-heading">Calendario</h2>
        <button class="view-all" id="viewAllButton" type="button">Ver todo</button>
        <div class="entry-list" id="entryList"></div>
      </section>

      <div class="bottom-bar" aria-hidden="true"></div>
    </section>
  </main>

  <script>
    let monthlyGoal = 4000000;
    const COMMISSION_RATE = 0.005;
    const CLOSING_DAY = 24;

    const monthNamesLong = [
      'Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio',
      'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'
    ];

    const monthNamesShort = [
      'Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun',
      'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'
    ];

    const weekdayNamesShort = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
    const weekdayNamesLong = ['domingo', 'lunes', 'martes', 'miércoles', 'jueves', 'viernes', 'sábado'];

    const realToday = new Date();
    let selectedMonthDate = new Date(realToday.getFullYear(), realToday.getMonth(), 1);
    let activeMetric = 'earned';
    let activeDayIndex = 0;
    let showAllEntries = false;
    let days = createPartTimeMonthDays(selectedMonthDate);

    function cloneDate(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function getMonday(date) {
      const day = date.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      const monday = cloneDate(date);
      monday.setDate(date.getDate() + diff);
      return monday;
    }

    function getReferenceDateForMonth(monthDate) {
      const isCurrentMonth =
        monthDate.getFullYear() === realToday.getFullYear() &&
        monthDate.getMonth() === realToday.getMonth();

      const referenceDay = isCurrentMonth
        ? realToday.getDate()
        : Math.min(realToday.getDate(), new Date(monthDate.getFullYear(), monthDate.getMonth() + 1, 0).getDate());

      return new Date(monthDate.getFullYear(), monthDate.getMonth(), referenceDay);
    }

    function createMonthWeek(monthDate) {
      const reference = getReferenceDateForMonth(monthDate);
      const monday = getMonday(reference);

      return Array.from({ length: 7 }, (_, index) => {
        const date = cloneDate(monday);
        date.setDate(monday.getDate() + index);

        const dayName = weekdayNamesShort[date.getDay()];
        const dayNumber = String(date.getDate()).padStart(2, '0');
        const monthShort = monthNamesShort[date.getMonth()];
        const fullDay = `${weekdayNamesLong[date.getDay()]}, ${dayNumber} ${monthShort}`;

        return {
          date,
          name: dayName,
          number: dayNumber,
          full: fullDay,
          amount: 0
        };
      });
    }

    function createPartTimeMonthDays(monthDate) {
      const year = monthDate.getFullYear();
      const month = monthDate.getMonth();
      const partTimeDays = [];

      for (let day = 1; day <= CLOSING_DAY; day++) {
        const date = new Date(year, month, day);
        if (date.getMonth() !== month) continue;

        const weekday = date.getDay();
        if (weekday !== 0 && weekday !== 6) continue;

        const dayName = weekdayNamesShort[weekday];
        const dayNumber = String(date.getDate()).padStart(2, '0');
        const monthShort = monthNamesShort[date.getMonth()];

        partTimeDays.push({
          date,
          name: dayName,
          number: dayNumber,
          full: `${weekdayNamesLong[weekday]}, ${dayNumber} ${monthShort}`,
          amount: 0
        });
      }

      return partTimeDays;
    }

    function createDaysForCurrentMode() {
      return workSwitch && workSwitch.classList.contains('full')
        ? createMonthWeek(selectedMonthDate)
        : createPartTimeMonthDays(selectedMonthDate);
    }

    function isLastWeekendWorkDay(index) {
      if (workSwitch.classList.contains('full')) return false;
      return index === days.length - 1 || index === days.length - 2;
    }

    function updateMonthSectionTitle() {
      const monthIndex = selectedMonthDate.getMonth();
      const year = selectedMonthDate.getFullYear();
      const baseTitle = `${monthNamesLong[monthIndex]} ${year}`;

      monthTitle.textContent = isLastWeekendWorkDay(activeDayIndex)
        ? 'Último finde del mes'
        : baseTitle;
    }


    function getCurrentDayIndex(monthDate) {
      const isCurrentMonth =
        monthDate.getFullYear() === realToday.getFullYear() &&
        monthDate.getMonth() === realToday.getMonth();

      if (isCurrentMonth) {
        const todayIndex = days.findIndex((day) =>
          day.date.getFullYear() === realToday.getFullYear() &&
          day.date.getMonth() === realToday.getMonth() &&
          day.date.getDate() === realToday.getDate()
        );

        if (todayIndex >= 0) return todayIndex;

        const nextAvailableIndex = days.findIndex((day) => day.date >= realToday);
        if (nextAvailableIndex >= 0) return nextAvailableIndex;
      }

      const selectedMonth = monthDate.getMonth();
      const firstInsideMonth = days.findIndex((day) => day.date.getMonth() === selectedMonth);
      return firstInsideMonth >= 0 ? firstInsideMonth : 0;
    }

    const workSwitch = document.getElementById('workSwitch');
    const metricTabs = document.getElementById('metricTabs');
    const metricCaption = document.getElementById('metricCaption');
    const mainAmount = document.getElementById('mainAmount');
    const salesInput = document.getElementById('salesInput');
    const commissionAmount = document.getElementById('commissionAmount');
    const progressRing = document.getElementById('progressRing');
    const progressPercent = document.getElementById('progressPercent');
    const goalInput = document.getElementById('goalInput');
    const workDaysInput = document.getElementById('workDaysInput');
    const remainingDaysValue = document.getElementById('remainingDaysValue');
    const weekSelector = document.getElementById('weekSelector');
    let dayButtons = Array.from(document.querySelectorAll('.day-btn'));
    const dateLabel = document.getElementById('dateLabel');
    const monthButtons = Array.from(document.querySelectorAll('.month-btn'));
    const monthTitle = document.getElementById('monthTitle');
    const entryList = document.getElementById('entryList');
    const viewAllButton = document.getElementById('viewAllButton');
    const saveToast = document.getElementById('saveToast');
    const monthRefresh = document.getElementById('monthRefresh');
    const screen = document.querySelector('.screen');

    let saveTimeout = null;
    let currentProgress = 0;
    let progressAnimationFrame = null;

    function formatCLP(value) {
      const rounded = Math.max(0, Math.round(Number(value) || 0));
      return '$' + rounded.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    }

    function getTotalEarned() {
      return days.reduce((sum, day) => sum + day.amount, 0);
    }

    function getRemainingDays() {
      const activeDate = days[activeDayIndex].date;
      const closureDate = new Date(activeDate.getFullYear(), activeDate.getMonth(), CLOSING_DAY);
      const millisecondsPerDay = 24 * 60 * 60 * 1000;
      const remaining = Math.floor((closureDate - activeDate) / millisecondsPerDay) + 1;
      return Math.max(1, remaining);
    }

    function countWeekendWorkDaysUntilClosure(monthDate) {
      const year = monthDate.getFullYear();
      const month = monthDate.getMonth();
      let total = 0;

      for (let day = 1; day <= CLOSING_DAY; day++) {
        const date = new Date(year, month, day);
        const weekday = date.getDay();
        if (weekday === 0 || weekday === 6) total++;
      }

      return total;
    }

    function countFullTimeWorkDaysUntilClosure(monthDate) {
      const year = monthDate.getFullYear();
      const month = monthDate.getMonth();
      let totalCalendarDays = 0;

      for (let day = 1; day <= CLOSING_DAY; day++) {
        const date = new Date(year, month, day);
        if (date.getMonth() === month) totalCalendarDays++;
      }

      const fullWeeks = Math.floor(totalCalendarDays / 7);
      const estimatedFreeDays = fullWeeks * 2;
      return Math.max(1, totalCalendarDays - estimatedFreeDays);
    }

    function getDefaultWorkDays() {
      return workSwitch.classList.contains('full')
        ? countFullTimeWorkDaysUntilClosure(selectedMonthDate)
        : countWeekendWorkDaysUntilClosure(selectedMonthDate);
    }

    function getRegisteredWorkDays() {
      return days.filter((day) => day.amount > 0).length;
    }

    function updateRemainingWorkDays() {
      const workDays = Number(workDaysInput.value.replace(/\D/g, '')) || 0;
      const remaining = Math.max(0, workDays - getRegisteredWorkDays());
      remainingDaysValue.textContent = String(remaining);
    }

    function resetWorkDaysToDefault() {
      workDaysInput.value = String(getDefaultWorkDays());
      updateRemainingWorkDays();
    }

    function getMetricValue() {
      const earned = getTotalEarned();
      const missing = Math.max(0, monthlyGoal - earned);
      const workDays = Number(workDaysInput.value.replace(/\D/g, '')) || getRemainingDays();
      const remainingWorkDays = Math.max(1, workDays - getRegisteredWorkDays());
      const daily = Math.ceil(missing / remainingWorkDays);

      if (activeMetric === 'missing') return missing;
      if (activeMetric === 'daily') return daily;
      return earned;
    }

    function getMetricLabel() {
      if (activeMetric === 'missing') return 'Falta';
      if (activeMetric === 'daily') return 'Diario';
      return 'Llevas';
    }

    function updateMainMetric() {
      mainAmount.classList.add('updating');

      window.setTimeout(() => {
        metricCaption.textContent = getMetricLabel();
        mainAmount.textContent = formatCLP(getMetricValue());
        mainAmount.classList.remove('updating');
      }, 120);
    }

    function animateProgressTo(nextProgress) {
      if (progressAnimationFrame) {
        window.cancelAnimationFrame(progressAnimationFrame);
      }

      const startProgress = currentProgress;
      const distance = nextProgress - startProgress;
      const duration = 520;
      const startTime = performance.now();

      function step(now) {
        const elapsed = Math.min(1, (now - startTime) / duration);
        const eased = 1 - Math.pow(1 - elapsed, 3);
        const value = startProgress + distance * eased;
        const visualValue = Math.round(value);

        progressRing.style.setProperty('--progress', value.toFixed(2));
        progressPercent.textContent = visualValue + '%';

        if (elapsed < 1) {
          progressAnimationFrame = window.requestAnimationFrame(step);
        } else {
          currentProgress = nextProgress;
          progressRing.style.setProperty('--progress', nextProgress);
          progressPercent.textContent = nextProgress + '%';
        }
      }

      progressAnimationFrame = window.requestAnimationFrame(step);
    }

    function updateProgress() {
      const earned = getTotalEarned();
      const progress = Math.min(100, monthlyGoal > 0 ? Math.round((earned / monthlyGoal) * 100) : 0);
      const estimatedCommission = Math.round(earned * COMMISSION_RATE);

      animateProgressTo(progress);
      commissionAmount.textContent = formatCLP(estimatedCommission);
    }

    function updateCurrentInput() {
      salesInput.value = '';
      salesInput.placeholder = days[activeDayIndex].amount
        ? days[activeDayIndex].amount.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.')
        : '0';
    }

    function showSavedAnimation() {
      if (saveTimeout) window.clearTimeout(saveTimeout);
      saveToast.classList.remove('show');
      void saveToast.offsetWidth;
      saveToast.classList.add('show');
      saveTimeout = window.setTimeout(() => {
        saveToast.classList.remove('show');
      }, 1100);
    }

    function playMonthRefresh() {
      screen.classList.add('refreshing');
      monthRefresh.classList.add('active');
      window.setTimeout(() => {
        monthRefresh.classList.remove('active');
        screen.classList.remove('refreshing');
      }, 720);
    }

    function renderEntries() {
      entryList.innerHTML = '';

      days.forEach((day, index) => {
        const entry = document.createElement('article');
        entry.className = 'entry';
        if (showAllEntries || index === activeDayIndex || day.amount > 0) {
          entry.classList.add('visible');
        }

        entry.innerHTML = `
          <div class="entry-day">${day.name}</div>
          <div class="entry-number">${day.number}</div>
          <div class="entry-description">Ingreso neto registrado</div>
          <div class="entry-charge">
            <div class="entry-pill">Diario</div>
            <div class="entry-commission">Comisión</div>
          </div>
          <div class="entry-amount">${formatCLP(day.amount)}</div>
        `;

        entry.addEventListener('click', () => selectDay(index));
        entryList.appendChild(entry);
      });
    }

    function updateWeekLabels() {
      const isPartTime = !workSwitch.classList.contains('full');

      weekSelector.classList.toggle('weekend-only', isPartTime);
      weekSelector.style.setProperty('--visible-days', String(days.length));

      weekSelector.innerHTML = days.map((day, index) => `
        <button class="day-btn" type="button" data-index="${index}">
          <span class="day-bg"></span>
          <span class="day-name">${day.name}</span>
          <span class="day-number">${day.number}</span>
        </button>
      `).join('');

      dayButtons = Array.from(weekSelector.querySelectorAll('.day-btn'));
      dayButtons.forEach((button, index) => {
        button.addEventListener('click', () => selectDay(index));
      });
    }

    function getDefaultActiveDayIndex() {
      return getCurrentDayIndex(selectedMonthDate);
    }

    function resetMonthView() {
      days = createDaysForCurrentMode();
      activeDayIndex = getDefaultActiveDayIndex();
      showAllEntries = false;
      currentProgress = 0;

      progressRing.style.setProperty('--progress', 0);
      progressPercent.textContent = '0%';
      commissionAmount.textContent = '$0';
      mainAmount.textContent = '$0';
      monthlyGoal = 4000000;
      goalInput.value = '4.000.000';
      salesInput.value = '';
      salesInput.placeholder = '0';
      viewAllButton.textContent = 'Ver todo';
      resetWorkDaysToDefault();

      updateWeekLabels();
      selectDay(activeDayIndex);
    }

    function selectDay(index) {
      activeDayIndex = Math.max(0, Math.min(index, days.length - 1));

      dayButtons.forEach((button, buttonIndex) => {
        button.classList.toggle('active', buttonIndex === activeDayIndex);
      });

      dateLabel.textContent = days[activeDayIndex].full;
      updateMonthSectionTitle();
      updateCurrentInput();
      updateMainMetric();
      renderEntries();
    }

    function updateAll() {
      updateProgress();
      updateMainMetric();
      updateRemainingWorkDays();
      renderEntries();
    }

    workSwitch.addEventListener('click', () => {
      workSwitch.classList.toggle('full');
      days = createDaysForCurrentMode();
      activeDayIndex = getDefaultActiveDayIndex();
      updateWeekLabels();
      selectDay(activeDayIndex);
      resetWorkDaysToDefault();
      updateAll();
    });

    metricTabs.addEventListener('click', (event) => {
      const selected = event.target.closest('.metric-tab');
      if (!selected) return;

      activeMetric = selected.dataset.tab;
      metricTabs.dataset.active = activeMetric;
      updateMainMetric();
    });

    goalInput.addEventListener('input', () => {
      const rawValue = goalInput.value.replace(/\D/g, '');
      monthlyGoal = Number(rawValue || 0);
      goalInput.value = rawValue ? rawValue.replace(/\B(?=(\d{3})+(?!\d))/g, '.') : '';
      updateAll();
    });

    goalInput.addEventListener('blur', () => {
      goalInput.value = monthlyGoal
        ? monthlyGoal.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.')
        : '0';
    });

    workDaysInput.addEventListener('input', () => {
      const rawValue = workDaysInput.value.replace(/\D/g, '');
      workDaysInput.value = rawValue;
      updateRemainingWorkDays();
      updateMainMetric();
    });

    workDaysInput.addEventListener('blur', () => {
      if (!workDaysInput.value) {
        resetWorkDaysToDefault();
        updateAll();
      }
    });

    monthButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const monthIndex = Number(button.dataset.monthIndex);
        const year = Number(button.dataset.year);

        selectedMonthDate = new Date(year, monthIndex, 1);

        monthButtons.forEach((item) => item.classList.remove('active'));
        button.classList.add('active');

        monthTitle.textContent = `${monthNamesLong[monthIndex]} ${year}`;
        resetMonthView();
        playMonthRefresh();
      });
    });

    function saveCurrentInput() {
      const rawValue = salesInput.value.replace(/\D/g, '');
      if (!rawValue) {
        updateCurrentInput();
        return;
      }

      days[activeDayIndex].amount = Number(rawValue);
      updateAll();
      showSavedAnimation();
      updateCurrentInput();
    }

    salesInput.addEventListener('input', () => {
      const rawValue = salesInput.value.replace(/\D/g, '');
      salesInput.value = rawValue ? rawValue.replace(/\B(?=(\d{3})+(?!\d))/g, '.') : '';
    });

    salesInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        saveCurrentInput();
        salesInput.blur();
      }
    });

    salesInput.addEventListener('blur', saveCurrentInput);

    viewAllButton.addEventListener('click', () => {
      showAllEntries = !showAllEntries;
      viewAllButton.textContent = showAllEntries ? 'Ocultar' : 'Ver todo';
      renderEntries();
    });

    function setupRealTimeCalendar() {
      const buttons = monthButtons;
      const currentYear = realToday.getFullYear();
      const currentMonth = realToday.getMonth();

      buttons.forEach((button, index) => {
        const date = new Date(currentYear, currentMonth + index, 1);
        button.dataset.monthIndex = String(date.getMonth());
        button.dataset.year = String(date.getFullYear());
        button.textContent = monthNamesShort[date.getMonth()];
        button.classList.toggle('active', index === 0);
      });

      selectedMonthDate = new Date(currentYear, currentMonth, 1);
      monthTitle.textContent = `${monthNamesLong[currentMonth]} ${currentYear}`;
      days = createDaysForCurrentMode();
      activeDayIndex = getDefaultActiveDayIndex();
      dateLabel.textContent = days[activeDayIndex].full;
      updateMonthSectionTitle();
    }

    setupRealTimeCalendar();
    resetMonthView();
  </script>
</body>
</html>
